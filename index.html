<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar GBD Los Lagos | Full Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        :root {
            --bg-panel: rgba(255, 255, 255, 0.96);
            --border: #d1d5db;
            --accent: #2563eb;
            --green: #16a34a;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f3f4f6; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .overlay-panel {
            position: absolute; top: 15px; right: 15px; width: 420px;
            max-height: calc(100% - 30px); background: var(--bg-panel);
            backdrop-filter: blur(10px); border: 1px solid var(--border);
            border-radius: 12px; z-index: 1000; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .tabs { display: flex; background: #f1f5f9; border-radius: 12px 12px 0 0; border-bottom: 1px solid var(--border); }
        .tab-btn { 
            flex: 1; padding: 14px; border: none; background: none; cursor: pointer;
            font-size: 11px; font-weight: bold; color: #64748b; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tab-btn.active { color: var(--accent); background: white; border-bottom: 2px solid var(--accent); }

        .content-area { flex: 1; overflow-y: auto; display: none; }
        .content-area.active { display: block; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead { position: sticky; top: 0; background: #f8fafc; z-index: 2; }
        th { padding: 10px 8px; text-align: left; color: #475569; border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; color: #1e293b; }

        .filter-input {
            width: 100%; box-sizing: border-box; background: white; border: 1px solid var(--border);
            color: #1f2937; padding: 5px; border-radius: 4px; font-size: 10px; margin-top: 4px; outline: none;
        }

        .tag-sp { background: var(--green); color: white; padding: 2px 6px; border-radius: 6px; font-weight: bold; }
        .bird-name { font-weight: bold; color: #0f172a; font-size: 12px; }
        .warn-box { padding: 8px 12px; font-size: 10px; background: #fffbeb; color: #92400e; border-bottom: 1px solid #fef3c7; display: flex; align-items: center; gap: 8px; }

        @media (max-width: 768px) {
            .overlay-panel { top: auto; right: 0; left: 0; bottom: 0; width: 100%; height: 45%; border-radius: 15px 15px 0 0; }
            #map { height: 55%; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay-panel">
        <div class="tabs">
            <button id="btn-listas" class="tab-btn active" onclick="switchTab('tab-listas')"><i class="fas fa-list"></i> Listas</button>
            <button id="btn-especies" class="tab-btn" onclick="switchTab('tab-especies')"><i class="fas fa-dove"></i> Especies Hoy</button>
        </div>

        <div id="tab-listas" class="content-area active">
            <table>
                <thead>
                    <tr>
                        <th width="15%">Día <br><input type="text" id="filter-dia" class="filter-input" onkeyup="filterListas()"></th>
                        <th>Observador <br><input type="text" id="filter-user" class="filter-input" onkeyup="filterListas()"></th>
                        <th width="12%">Esp</th>
                        <th width="10%">Web</th>
                    </tr>
                </thead>
                <tbody id="body-listas">
                    <tr><td colspan="4" style="text-align:center; padding:20px;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="tab-especies" class="content-area">
            <div class="warn-box"><i class="fas fa-info-circle"></i> <span>Datos científicos con desfase.</span></div>
            <table>
                <thead>
                    <tr>
                        <th>Especie</th>
                        <th>Lugar</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody id="body-especies">
                    <tr><td colspan="3" style="text-align:center; padding:20px;">Sincronizando aves...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        const API_KEY = "dnbm87a73dmo";
        const REGION = "CL-LL";
        let rawListas = [];
        let diaFiltroInicial = "";

        // --- CONFIGURACIÓN DE MAPAS ---
        const lightMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '©CartoDB' });
        const satelliteMap = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: '©Google' });

        const map = L.map('map', { zoomControl: false, layers: [satelliteMap] }).setView([-41.47, -72.94], 9);
        
        // El botón desaparecido:
        L.control.layers({ "Satélite": satelliteMap, "Mapa": lightMap }, null, { position: 'topleft' }).addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        const markers = L.layerGroup().addTo(map);

        window.onload = () => {
            const hoy = new Date();
            diaFiltroInicial = new Intl.DateTimeFormat('es-CL', { timeZone: "America/Santiago", day: '2-digit' }).format(hoy);
            document.getElementById('filter-dia').value = diaFiltroInicial;
            init();
        };

        async function init() {
            await fetchListas();
            await fetchEspecies();
        }

        async function fetchListas() {
            try {
                const res = await fetch(`https://api.ebird.org/v2/product/lists/${REGION}?maxResults=150`, { headers: {"X-eBirdApiToken": API_KEY} });
                rawListas = await res.json();
                filterListas();
            } catch (e) { console.error(e); }
        }

        async function fetchEspecies() {
            try {
                const res = await fetch(`https://api.ebird.org/v2/data/obs/${REGION}/recent?locale=es_CL`, { headers: {"X-eBirdApiToken": API_KEY} });
                const data = await res.json();
                const hoyIso = new Intl.DateTimeFormat('en-CA', { timeZone: "America/Santiago" }).format(new Date());
                const filtradas = data.filter(o => o.obsDt.startsWith(hoyIso));
                
                document.getElementById('body-especies').innerHTML = filtradas.length ? filtradas.map(o => `
                    <tr><td class="bird-name">${o.comName}</td><td>${o.locName.substring(0,15)}..</td><td>${o.obsDt.split(' ')[1] || '--'}</td></tr>
                `).join('') : '<tr><td colspan="3" style="text-align:center; padding:20px;">Sin registros hoy.</td></tr>';
            } catch (e) { console.error(e); }
        }

        function filterListas() {
            const fDia = document.getElementById('filter-dia').value.toLowerCase();
            const fUser = document.getElementById('filter-user').value.toLowerCase();
            markers.clearLayers();
            const filtradas = rawListas.filter(l => l.obsDt.includes(fDia) && l.userDisplayName.toLowerCase().includes(fUser));

            document.getElementById('body-listas').innerHTML = filtradas.map(l => `
                <tr>
                    <td onclick="map.flyTo([${l.loc.latitude}, ${l.loc.longitude}], 14)" style="cursor:pointer">${l.obsDt.substring(8,16)}</td>
                    <td onclick="..." style="cursor:pointer">
                        <b>${l.userDisplayName.split(' ')[0]} ${l.userDisplayName.split(' ')[1] ? l.userDisplayName.split(' ')[1][0] + '.' : ''}</b>
                    </td>
                    <td style="text-align:center"><span class="tag-sp">${l.numSpecies}</span></td>
                    <td style="text-align:center"><a href="https://ebird.org/checklist/${l.subId}" target="_blank" style="color:var(--accent)"><i class="fas fa-external-link-alt"></i></a></td>
                </tr>
            `).join('');

            filtradas.forEach(l => {
                const esHoy = l.obsDt.includes(diaFiltroInicial);
                L.circleMarker([l.loc.latitude, l.loc.longitude], {
                    radius: esHoy ? 9 : 6, fillColor: esHoy ? '#16a34a' : '#2563eb',
                    color: "white", weight: 2, fillOpacity: 0.85
                }).addTo(markers).bindPopup(`<b>${l.userDisplayName}</b><br>${l.loc.name}`);
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('active');
        }

        setInterval(init, 300000);
    </script>
</body>
</html>
